<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Briefings · Postos Gasparini</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #DDE1EE;
      min-height: 100vh;
      padding: 20px 16px 40px;
      color: #1a202c;
    }
    .wrapper {
      max-width: 660px;
      margin: 0 auto;
    }
    .header {
      background: linear-gradient(150deg, #0A1020, #1C2B6E, #2A3E8C);
      border-radius: 14px 14px 0 0;
      padding: 28px 28px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-oval {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #C8CCD8, #ffffff, #C8CCD8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(200,204,216,0.3);
    }
    .logo-oval-inner { display: flex; flex-direction: column; align-items: center; line-height: 1; gap: 1px; }
    .logo-postos { font-size: 9px; font-weight: 800; color: #1C2B6E; letter-spacing: 1.5px; text-transform: uppercase; }
    .logo-gasparini { font-size: 7.5px; font-weight: 900; color: #0A1020; letter-spacing: 0.8px; text-transform: uppercase; }
    .logo-desde { font-size: 6px; font-weight: 500; color: #4A5568; letter-spacing: 0.5px; }
    .header-text h1 { font-size: 20px; font-weight: 800; color: #ffffff; letter-spacing: -0.3px; }
    .header-text p { font-size: 13px; color: #A0AEC0; margin-top: 3px; }
    .rule { height: 3px; background: linear-gradient(90deg, #1C2B6E, #C8CCD8, #1C2B6E); }
    .content { background: #fff; border-radius: 0 0 14px 14px; padding: 24px; }
    .section-label { font-size: 10px; font-weight: 700; color: #718096; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; }
    .briefing-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; margin-bottom: 8px;
      background: #F7F9FC; border: 1px solid #E8ECF4;
      border-radius: 10px; text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .briefing-item:hover { background: #EBF0FF; border-color: #C3CFF7; }
    .briefing-date { font-size: 15px; font-weight: 700; color: #1C2B6E; }
    .briefing-day { font-size: 12px; color: #718096; margin-top: 1px; }
    .badge-hoje {
      background: #C6F6D5; color: #276749;
      font-size: 10px; font-weight: 700;
      border-radius: 20px; padding: 2px 10px;
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-left: auto; flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .header { flex-direction: column; text-align: center; gap: 12px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo-oval">
      <div class="logo-oval-inner">
        <span class="logo-postos">POSTOS</span>
        <span class="logo-gasparini">GASPARINI</span>
        <span class="logo-desde">DESDE 1989</span>
      </div>
    </div>
    <div class="header-text">
      <h1>Briefings Diários</h1>
      <p>Arquivo de briefings · Postos Gasparini</p>
    </div>
  </div>
  <div class="rule"></div>
  <div class="content">
    <div class="section-label">Briefings disponíveis</div>

    <a class="briefing-item" href="2026-03-24.html">

      </div>
      <span class="badge-hoje">Hoje</span>
    </a>

    <a class="briefing-item" href="2026-03-23.html">
      <div>
        <div class="briefing-date">23/03/2026</div>
        <div class="briefing-day">Segunda-feira</div>
      </div>
    </a>

    <a class="briefing-item" href="2026-03-22.html">
      <div>
        <div class="briefing-date">22/03/2026</div>
        <div class="briefing-day">Domingo</div>
      </div>
    </a>

    <a class="briefing-item" href="2026-03-21.html">
      <div>
        <div class="briefing-date">21/03/2026</div>
        <div class="briefing-day">Sábado</div>
      </div>
    </a>

    <a class="briefing-item" href="2026-03-20.html">

        <div class="briefing-date">20/03/2026</div>

    <a class="briefing-item" href="2026-03-19.html">
      <div>
        <div class="briefing-date">19/03/2026</div>
        <div class="briefing-day">Quinta-feira</div>
      </div>
    </a>

  </div>
</div>
</body>
</html>
