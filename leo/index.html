<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leo — Daily Briefings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F7FB; color: #0F1729; }

    .topbar {
      background: linear-gradient(135deg, #0B3D91, #1B56B0, #2D6FD9);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }
    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .topbar-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .container { max-width: 720px; margin: 40px auto; padding: 0 20px 60px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #9BABC4;
      margin-bottom: 16px;
    }

    .briefing-list { display: flex; flex-direction: column; gap: 10px; }

    .briefing-item {
      background: #fff;
      border: 1px solid #D4DCE8;
      border-radius: 10px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .briefing-item:hover {
      border-color: #1B56B0;
      box-shadow: 0 4px 12px rgba(27,86,176,0.1);
    }
    .briefing-item.latest {
      border-color: #1B56B0;
      background: linear-gradient(135deg, #f0f5ff, #fff);
    }
    .item-left { display: flex; align-items: center; gap: 14px; }
    .item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #D4DCE8;
      flex-shrink: 0;
    }
    .latest .item-dot { background: #1B56B0; }
    .item-date {
      font-size: 15px;
      font-weight: 600;
      color: #0F1729;
    }
    .item-label {
      font-size: 12px;
      color: #9BABC4;
      margin-top: 2px;
    }
    .latest .item-label { color: #1B56B0; font-weight: 500; }
    .item-arrow { color: #9BABC4; font-size: 16px; }
    .latest .item-arrow { color: #1B56B0; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9BABC4;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="../index.html" class="back-link">
      ← Voltar
    </a>
    <div>
      <div class="topbar-title">Leonardo — SunR CEO Briefing</div>
      <div class="topbar-sub">Gerado todo dia às 7h05</div>
    </div>
  </div>

  <div class="container">
    <div class="section-label">Briefings recentes</div>
    <div class="briefing-list" id="briefing-list">
      <!-- Preenchido dinamicamente ou manualmente -->
    </div>
  </div>

  <script>
    // Lista de briefings disponíveis — atualizada automaticamente
    const briefings = [
      { date: "2026-03-19", label: "Hoje", file: "2026-03-19.html" }
    ];

    const list = document.getElementById('briefing-list');

    if (briefings.length === 0) {
      list.innerHTML = '<div class="empty-state">Nenhum briefing disponível ainda.</div>';
    } else {
      briefings.forEach((b, i) => {
        const a = document.createElement('a');
        a.href = b.file;
        a.className = 'briefing-item' + (i === 0 ? ' latest' : '');
        a.innerHTML = `
          <div class="item-left">
            <div class="item-dot"></div>
            <div>
              <div class="item-date">${b.date}</div>
              <div class="item-label">${b.label || 'SunR Daily Briefing'}</div>
            </div>
          </div>
          <div class="item-arrow">→</div>
        `;
        list.appendChild(a);
      });
    }
  </script>

</body>
</html>
