<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Briefings — Leo SunR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue-dark:#1B3A6B;--blue-mid:#1B56B0;--gold:#F5C842;--bg:#F5F7FA;--card:#fff;--border:#E4E8F0;--text:#1A1D2B;--meta:#7A8099;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue-mid) 100%);padding:32px;text-align:center;}
.logo{width:48px;height:48px;background:var(--gold);border-radius:10px;font-weight:800;color:var(--blue-dark);display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:12px;}
.header h1{color:#fff;font-size:1.3rem;font-weight:700;}
.header p{color:rgba(255,255,255,0.7);font-size:0.82rem;margin-top:4px;}
.gold-bar{height:3px;background:var(--gold);border-radius:2px;margin-top:16px;}
.container{max-width:640px;margin:0 auto;padding:28px 20px;}
.list-title{font-size:0.78rem;font-weight:700;color:var(--meta);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.brief-item{background:var(--card);border-radius:10px;box-shadow:0 2px 8px rgba(27,58,107,0.07);margin-bottom:10px;overflow:hidden;text-decoration:none;display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--border);transition:box-shadow 0.15s;}
.brief-item:hover{box-shadow:0 4px 16px rgba(27,58,107,0.14);}
.brief-dot{width:10px;height:10px;border-radius:50%;background:var(--blue-mid);flex-shrink:0;}
.brief-dot.today{background:var(--gold);box-shadow:0 0 0 3px rgba(245,200,66,0.25);}
.brief-info{flex:1;}
.brief-date{font-size:0.88rem;font-weight:700;color:var(--text);}
.brief-label{font-size:0.72rem;color:var(--meta);margin-top:2px;}
.brief-badge{font-size:0.68rem;font-weight:700;background:#FFF8EC;color:#E8890A;padding:2px 8px;border-radius:10px;flex-shrink:0;}
.arrow{color:var(--meta);flex-shrink:0;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SR</div>
  <h1>Daily Briefings &mdash; Leo</h1>
  <p>SunR Reciclagem Fotovoltaica &middot; Arquivo de briefings</p>
  <div class="gold-bar"></div>
</div>
<div class="container">
  <div class="list-title">Briefings Disponíveis</div>
  <a class="brief-item" href="2026-03-19.html">
    <div class="brief-dot today"></div>
    <div class="brief-info">
      <div class="brief-date">Quinta-feira, 19 de março de 2026</div>
      <div class="brief-label">Petrobras CENPES &middot; SISBAJUD JHG &middot; Conflito ABRAMAR</div>
    </div>
    <span class="brief-badge">Hoje</span>
    <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>
</body>
</html>
