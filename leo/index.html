<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefings — Leo · SunR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F5F7FA;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1B3A6B 0%, #1B56B0 50%, #2D6FD9 100%);
      border-bottom: 4px solid #F5C842;
      padding: 32px 40px 28px;
    }
    header h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .container {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #4F5565;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .briefing-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .briefing-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(27,54,107,0.08);
      display: flex;
      align-items: center;
      padding: 16px 20px;
      text-decoration: none;
      transition: box-shadow 0.15s, transform 0.15s;
      border-left: 4px solid transparent;
    }
    .briefing-item:hover {
      box-shadow: 0 4px 16px rgba(27,86,176,0.15);
      transform: translateX(2px);
    }
    .briefing-item.hoje {
      border-left-color: #F5C842;
    }
    .briefing-item.hoje .badge {
      background: #F5C842;
      color: #1A1D2B;
    }
    .briefing-item .badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #E8F0FB;
      color: #1B56B0;
      border-radius: 5px;
      padding: 3px 8px;
      margin-right: 14px;
      white-space: nowrap;
    }
    .briefing-item .info { flex: 1; }
    .briefing-item .date-label {
      font-size: 1rem;
      font-weight: 600;
      color: #1A1D2B;
    }
    .briefing-item .date-sub {
      font-size: 0.8rem;
      color: #4F5565;
      margin-top: 2px;
    }
    .briefing-item .arrow {
      color: #1B56B0;
      font-size: 1.1rem;
      opacity: 0.5;
    }
    footer {
      text-align: center;
      color: #4F5565;
      font-size: 0.75rem;
      padding: 40px 0 24px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>Daily Briefings · Leo</h1>
    <p>SunR — Reciclagem Fotovoltaica · Chief of Staff Digital</p>
  </header>
  <div class="container">
    <div class="section-title">Selecione um briefing</div>
    <div class="briefing-list" id="briefing-list"></div>
  </div>
  <footer>SunR · Uso interno · Gerado automaticamente por Claude</footer>

  <script>
    const briefings = [
      { date: "2026-03-19", label: "Hoje", file: "2026-03-19.html" },
    ];

    const weekdays = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
    const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      return `${weekdays[dt.getDay()]}, ${d} ${months[m-1]} ${y}`;
    }

    const list = document.getElementById('briefing-list');
    briefings.forEach((b, i) => {
      const a = document.createElement('a');
      a.href = b.file;
      a.className = 'briefing-item' + (i === 0 ? ' hoje' : '');
      a.innerHTML = `
        <span class="badge">${b.label}</span>
        <div class="info">
          <div class="date-label">${formatDate(b.date)}</div>
          <div class="date-sub">Daily Briefing SunR</div>
        </div>
        <span class="arrow">›</span>
      `;
      list.appendChild(a);
    });
  </script>
</body>
</html>
